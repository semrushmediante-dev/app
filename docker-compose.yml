  #     test: ["CMD-SHELL", "pg_isready -U instagram_user"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - instagram-network
  #   restart: unless-stopped

  # (Opcional) Nginx como reverse proxy
  # Descomenta si quieres usar Nginx para servir la app
  # nginx:
  #   image: nginx:alpine
  #   container_name: instagram-nginx
