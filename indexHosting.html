<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Hosting | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
            --text: #f0f0f5; --muted: #6b6b80; --accent: #a855f7;
            --success: #22c55e; --error: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { margin-bottom: 40px; text-align: center; }
        h1 { font-family: 'Syne'; font-size: 2.5rem; background: linear-gradient(135deg, #fff 0%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        
        .input-group { position: relative; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: #fff; padding: 15px; font-family: monospace; resize: vertical; }
        
        .actions { display: flex; gap: 10px; }
        .btn { flex: 1; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-secondary { background: #1a1a24; border: 1px solid var(--border); width: auto; flex: 0; padding: 0 20px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(168, 85, 247, 0.2); }
        
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 15px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: #1a1a24; color: var(--muted); text-transform: uppercase; font-size: 11px; }
        .url-cell a { color: #60a5fa; text-decoration: none; }
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .status-online { background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .status-error { background: rgba(239, 68, 68, 0.1); color: var(--error); }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--muted); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Volver al Hub</a>
        <div class="header">
            <h1>Monitoreo de Hosting</h1>
            <p style="color: var(--muted)">Sube un CSV o pega la lista de webs</p>
        </div>

        <div class="card">
            <div class="input-group">
                <textarea id="urlInput" placeholder="ejemplo.com&#10;https://web.com"></textarea>
            </div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="document.getElementById('csvFile').click()">
                    📁 Subir CSV
                </button>
                <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="handleFile(this)">
                
                <button id="checkBtn" class="btn" onclick="checkHosting()">Iniciar Monitoreo Masivo</button>
            </div>
        </div>

        <div id="resultsWrapper" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>URL de Acceso</th>
                        <th>Estado</th>
                        <th>Código</th>
                        <th>Fecha/Hora</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Leer el archivo CSV y ponerlo en el textarea
        function handleFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                // Limpiamos el CSV: quitamos comillas y espacios
                const lines = text.split(/\r?\n/).map(line => line.split(',')[0].replace(/["']/g, "").trim());
                document.getElementById('urlInput').value = lines.filter(l => l !== "").join('\n');
            };
            reader.readAsText(file);
        }

        async function checkHosting() {
            const input = document.getElementById('urlInput').value;
            const urls = input.split('\n').map(u => u.trim()).filter(u => u !== "");
            
            if (urls.length === 0) return alert("No hay URLs para revisar");

            const btn = document.getElementById('checkBtn');
            btn.innerText = "Verificando...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/monitor-hosting', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urls: urls })
                });
                const data = await response.json();
                
                if(data.success) {
                    const tbody = document.getElementById('tableBody');
                    tbody.innerHTML = '';
                    data.results.forEach(res => {
                        const isOnline = res.estado === "EN LÍNEA";
                        tbody.innerHTML += `
                            <tr>
                                <td class="url-cell"><a href="${res.url}" target="_blank">${res.url} ↗</a></td>
                                <td><span class="status-badge ${isOnline ? 'status-online' : 'status-error'}">${res.estado}</span></td>
                                <td style="font-family: monospace">${res.status_code || '---'}</td>
                                <td style="color: var(--muted)">${res.fecha}</td>
                            </tr>
                        `;
                    });
                    document.getElementById('resultsWrapper').style.display = 'block';
                }
            } catch (e) {
                alert("Error de conexión");
            } finally {
                btn.innerText = "Iniciar Monitoreo Masivo";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
