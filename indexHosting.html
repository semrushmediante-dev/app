<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitoreo Seguro | Hosting</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0f; --surface: #13131a; --accent: #a855f7; --text: #f0f0f5; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 40px; }
        .card { background: var(--surface); padding: 30px; border-radius: 20px; border: 1px solid #1e1e2e; max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 120px; background: #000; color: #fff; border: 1px solid #1e1e2e; border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th { text-align: left; color: #6b6b80; font-size: 12px; padding: 10px; }
        td { padding: 12px; border-bottom: 1px solid #1e1e2e; font-size: 14px; }
        .status-online { color: #22c55e; }
        .status-error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Monitoreo Hosting</h1>
        <p>Sube tu CSV o pega las URLs debajo:</p>
        <textarea id="urlInput" placeholder="google.com"></textarea>
        <div style="display:flex; gap:10px;">
            <button class="btn" style="background:#1a1a24;" onclick="document.getElementById('csvFile').click()">📁 Subir CSV</button>
            <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="leerCSV(this)">
            <button id="btnMain" class="btn" onclick="iniciar()">Iniciar Monitoreo</button>
        </div>
        <div id="res" style="display:none">
            <table>
                <thead><tr><th>URL</th><th>ESTADO</th><th>CÓDIGO</th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function leerCSV(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const lineas = e.target.result.split(/\r?\n/)
                    .map(l => l.split(',')[0].replace(/["']/g, "").trim())
                    .filter(l => l !== "");
                document.getElementById('urlInput').value = lineas.join('\n');
            };
            reader.readAsText(input.files[0]);
        }

        async function iniciar() {
            const urls = document.getElementById('urlInput').value.split('\n').filter(u => u.trim());
            const btn = document.getElementById('btnMain');
            btn.disabled = true; btn.innerText = "Procesando...";

            try {
                const r = await fetch('/api/monitor-hosting', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({urls})
                });
                const d = await r.json();
                if(d.success) {
                    const tbody = document.getElementById('tbody');
                    tbody.innerHTML = d.results.map(res => `
                        <tr>
                            <td>${res.url}</td>
                            <td class="${res.estado === 'EN LÍNEA' ? 'status-online' : 'status-error'}">${res.estado}</td>
                            <td>${res.status_code || '---'}</td>
                        </tr>
                    `).join('');
                    document.getElementById('res').style.display = 'block';
                }
            } catch(e) { alert("Error de seguridad o red"); }
            finally { btn.disabled = false; btn.innerText = "Iniciar Monitoreo"; }
        }
    </script>
</body>
</html>
