<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitoreo Seguro | Hosting</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0f; --surface: #13131a; --accent: #a855f7; --text: #f0f0f5; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 40px; }
        .card { background: var(--surface); padding: 30px; border-radius: 20px; border: 1px solid #1e1e2e; max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 120px; background: #000; color: #fff; border: 1px solid #1e1e2e; border-radius: 10px; padding: 15px; margin-bottom: 20px; font-family: monospace; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th { text-align: left; color: #6b6b80; font-size: 12px; padding: 10px; }
        td { padding: 12px; border-bottom: 1px solid #1e1e2e; font-size: 14px; }
        .status-online { color: #22c55e; font-weight: 600; }
        .status-offline { color: #ef4444; font-weight: 600; }
        #res { display: none; }
        .error { color: #ef4444; margin-top: 20px; padding: 15px; background: rgba(239, 68, 68, 0.1); border-radius: 10px; }
        .success { color: #22c55e; margin-top: 20px; padding: 15px; background: rgba(34, 197, 94, 0.1); border-radius: 10px; }
        a.back { display: inline-block; margin-bottom: 20px; color: #a855f7; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <a href="/" class="back">← Volver</a>
        <h1>Monitoreo Hosting</h1>
        <p>Sube tu CSV o pega las URLs debajo:</p>
        <textarea id="urlInput" placeholder="google.com&#10;example.com&#10;github.com"></textarea>
        <div style="display:flex; gap:10px;">
            <button class="btn" style="background:#1a1a24;" onclick="document.getElementById('csvFile').click()">📁 Subir CSV</button>
            <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="leerCSV(this)">
            <button id="btnMain" class="btn" onclick="iniciar()">Iniciar Monitoreo</button>
        </div>
        
        <div id="error"></div>
        <div id="success"></div>
        
        <div id="res">
            <table>
                <thead><tr><th>URL</th><th>ESTADO</th><th>CÓDIGO</th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function leerCSV(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const lineas = e.target.result.split(/\r?\n/)
                    .map(l => l.split(',')[0].replace(/["']/g, "").trim())
                    .filter(l => l !== "");
                document.getElementById('urlInput').value = lineas.join('\n');
            };
            reader.readAsText(input.files[0]);
        }

        async function iniciar() {
            const urls = document.getElementById('urlInput').value
                .split('\n')
                .map(u => u.trim())
                .filter(u => u !== "");
            
            if (urls.length === 0) {
                mostrarError("Por favor ingresa al menos una URL");
                return;
            }

            const btn = document.getElementById('btnMain');
            btn.disabled = true;
            btn.innerText = "Procesando...";
            limpiarMensajes();

            try {
                const response = await fetch('/api/monitor-hosting', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({urls})
                });

                // Verificar que la respuesta sea JSON
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('El servidor no respondió con JSON. Status: ' + response.status);
                }

                const data = await response.json();
                
                if (data.success && data.results) {
                    const tbody = document.getElementById('tbody');
                    tbody.innerHTML = data.results.map(res => `
                        <tr>
                            <td>${escapeHtml(res.url)}</td>
                            <td class="${res.estado === 'EN LÍNEA' ? 'status-online' : 'status-offline'}">${res.estado}</td>
                            <td>${res.status_code || '---'}</td>
                        </tr>
                    `).join('');
                    document.getElementById('res').style.display = 'block';
                    mostrarExito(`Se analizaron ${data.results.length} URL(s) exitosamente`);
                } else {
                    mostrarError(data.error || "Error al procesar las URLs");
                }
            } catch (e) {
                console.error("Error:", e);
                mostrarError("Error: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Iniciar Monitoreo";
            }
        }

        function mostrarError(mensaje) {
            const div = document.getElementById('error');
            div.innerHTML = '<div class="error">' + escapeHtml(mensaje) + '</div>';
        }

        function mostrarExito(mensaje) {
            const div = document.getElementById('success');
            div.innerHTML = '<div class="success">' + escapeHtml(mensaje) + '</div>';
        }

        function limpiarMensajes() {
            document.getElementById('error').innerHTML = '';
            document.getElementById('success').innerHTML = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
